<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="formulario.css">
</head>
<body>
   
        <header>
            <form>
                <label>Faça seu cadastro</label>
                 <input type="text" name="Nome" placeholder="Nome completo" required autocomplete="off">
                 <input type="email" name="email" placeholder="Exemplo@gmail.com" required autocomplete="off">
                 <input type="password" name="Senha" placeholder="Digite sua Senha" required autocomplete="off">

                 <input type="date" name="Data" required autocomplete="off" style="color: #fcfeff;">

                 <input type="tel" name="Contato" placeholder="Digite seu numero" required autocomplete="off">
                 <input type="text"name="CPF" placeholder="000.000.000-00" required autocomplete="off">
                 <input type="text" name="Peso" placeholder="Coloque seu peso" autocomplete="off">
                 <input type="text" name="Altura" placeholder="Altura" autocomplete="off">
                 <button type="submit" >Comfimar</button>

            </form>
        </header>
   




</body>
</html>
